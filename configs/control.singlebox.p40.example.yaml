server:
  host: "127.0.0.1"
  port: 8800

auth:
  client_api_keys:
    - "change-me-client-key"
  node_api_keys:
    - "change-me-node-key"

storage:
  sqlite_path: "state/geniehive-p40.sqlite3"

roles_path: "configs/roles.singlebox.p40.example.yaml"

routing:
  health_stale_after_s: 30
  default_strategy: "round_robin"   # or "scored" or "least_loaded"
