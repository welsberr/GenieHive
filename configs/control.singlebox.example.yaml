server:
  host: "127.0.0.1"
  port: 8800

auth:
  client_api_keys:
    - "change-me-client-key"
  node_api_keys:
    - "change-me-node-key"

storage:
  sqlite_path: "state/geniehive-singlebox.sqlite3"

roles_path: "configs/roles.example.yaml"

routing:
  health_stale_after_s: 30
  default_strategy: "scored"   # or "round_robin" or "least_loaded"
