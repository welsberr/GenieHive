roles:
  - role_id: "mentor"
    display_name: "Mentor"
    operation: "chat"
    modality: "text"
    prompt_policy:
      system_prompt: "Guide the user without taking over the task."
    routing_policy:
      preferred_families: ["Qwen3", "Mistral"]
      min_context: 8192
      denied_trust_tiers: ["employee_device", "personal_device"]

  - role_id: "scientific_translator"
    display_name: "Scientific Translator"
    description: "Translation-oriented chat route for site localization"
    operation: "chat"
    modality: "text"
    prompt_policy:
      system_prompt: "Translate faithfully. Preserve meaning, structure, citations, and technical terms. Return only the translation."
      request_policy:
        body_defaults:
          temperature: 0.1
    routing_policy:
      preferred_families: ["Qwen3", "Mistral", "Llama"]
      min_context: 8192
      require_loaded: true
      allowed_trust_tiers: ["trusted_datacenter", "managed_cloud"]

  - role_id: "embedder"
    display_name: "Embedder"
    operation: "embeddings"
    modality: "text"
    routing_policy:
      require_loaded: true

  - role_id: "mac_background_assistant"
    display_name: "Mac Background Assistant"
    description: "Low-priority background route that may use opted-in Apple Silicon employee devices."
    operation: "chat"
    modality: "text"
    prompt_policy:
      system_prompt: "Handle background assistance tasks concisely."
      request_policy:
        body_defaults:
          temperature: 0.2
    routing_policy:
      preferred_families: ["Qwen2.5", "Llama3"]
      allow_employee_devices: true
      allowed_device_classes: ["apple_silicon_mac"]
      allowed_workload_classes: ["background", "low_priority"]
      min_context: 4096

  - role_id: "transcriber"
    display_name: "Transcriber"
    operation: "transcription"
    modality: "audio"
