server:
  host: "127.0.0.1"
  port: 8800

auth:
  client_api_keys:
    - "change-me-client-key"
  node_api_keys:
    - "change-me-node-key"

storage:
  sqlite_path: "state/geniehive.sqlite3"

roles_path: "configs/roles.example.yaml"

routing:
  default_strategy: "loaded_first"
  health_stale_after_s: 30
