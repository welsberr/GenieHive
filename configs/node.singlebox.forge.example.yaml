node:
  host_id: "singlebox-forge"
  display_name: "SingleBox Forge Proxy"
  listen_host: "127.0.0.1"
  listen_port: 8892
  address: "127.0.0.1"
  labels:
    topology: "singlebox"
    runtime: "forge"

control_plane:
  base_url: "http://127.0.0.1:8800"
  node_api_key: "change-me-node-key"
  heartbeat_interval_s: 5

inventory:
  model_roots:
    - "/path/to/models"
  cpu_threads: 24
  ram_gb: 64
  capabilities:
    cpu: true
    cuda: true
    guardrails: true
    forge_proxy: true

managed_runtimes:
  enabled: false

services:
  - service_id: "singlebox/chat/forge-qwen"
    kind: "chat"
    protocol: "openai"
    endpoint: "http://127.0.0.1:18081"
    runtime:
      engine: "forge-proxy"
      launcher: "external"
    assets:
      - asset_id: "qwen3-8b-forge"
        loaded: true
    state:
      health: "healthy"
      load_state: "loaded"
      accept_requests: true
    observed:
      p50_latency_ms: 1200
      tokens_per_sec: 25
